<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Mass — Ishi Olam</title>
<meta name="description" content="Daily Mass readings commentary. Ishi Olam.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A0908;--text:#E2D9C8;--gold:#C5A55A;--gold-dim:rgba(197,165,90,0.42);--fire:#8B6914;--surface:#12100E;--border:#1C1914}
html,body{background:var(--bg)}
body{color:var(--text);font-family:'EB Garamond',Georgia,serif;font-size:19px;line-height:1.86;letter-spacing:0.012em;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:rgba(197,165,90,0.15);color:var(--text)}

nav{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(10,9,8,0.97);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;padding:0 40px;z-index:100;border-bottom:1px solid rgba(197,165,90,0.05)}
.nav-home{font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.22em;color:rgba(197,165,90,0.32);text-transform:uppercase;text-decoration:none;transition:color .3s}
.nav-home:hover{color:var(--gold)}
.nav-section{font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(197,165,90,0.2)}

main{max-width:660px;margin:0 auto;padding:108px 36px 130px}

/* DATE NAV - always visible */
.date-nav{display:grid;grid-template-columns:64px 1fr 64px;align-items:start;margin-bottom:72px}
.nav-btn{background:none;border:none;cursor:pointer;font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(197,165,90,0.2);padding:6px 0;transition:color .3s;line-height:1}
.nav-btn:hover:not(:disabled){color:var(--gold-dim)}
.nav-btn:disabled{opacity:.08;cursor:default;pointer-events:none}
.nav-btn.at-end{opacity:.22;cursor:default;pointer-events:none}
.nav-btn.at-end::after{content:' —';font-size:8px;letter-spacing:0.1em;opacity:0.6}
.nav-btn.prev{text-align:left}.nav-btn.next{text-align:right}
.date-center{text-align:center}
.date-text{font-family:'Cinzel',serif;font-size:11.5px;letter-spacing:0.19em;text-transform:uppercase;color:rgba(197,165,90,0.45);line-height:1;min-height:14px}
.lit-day{margin-top:12px;font-style:italic;font-size:15px;color:rgba(197,165,90,0.27);line-height:1.55;min-height:23px}



.sep{text-align:center;padding:40px 0 52px;color:rgba(197,165,90,0.15);font-size:13px;letter-spacing:0.65em}

/* COMMENTARY LABEL - always visible */
.com-label{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:0.36em;text-transform:uppercase;color:rgba(197,165,90,0.2);margin-bottom:30px}

/* SUBTITLE - always visible */
.com-subtitle{font-style:italic;font-size:20px;color:rgba(197,165,90,0.5);line-height:1.65;margin-bottom:40px}
.com-subtitle:empty{display:none}

/* BODY - always visible, content fades in when loaded */
.com-body{font-size:19.5px;line-height:1.92}
.com-body p{margin-bottom:30px}
.com-body p:last-child{margin-bottom:0}
.com-body em{color:var(--gold);font-style:italic}
.com-body strong{color:rgba(226,217,200,0.9);font-weight:500}
.com-body h2,.com-body h3{font-family:'Cinzel',serif;font-weight:400;color:var(--gold);font-size:16px;letter-spacing:0.05em;margin:36px 0 18px}
.com-body blockquote{border-left:1px solid rgba(197,165,90,0.18);padding-left:22px;margin:28px 0;font-style:italic;color:rgba(197,165,90,0.55)}
.com-body a{color:var(--gold-dim);text-decoration:none;border-bottom:1px solid rgba(197,165,90,0.18);transition:color .3s,border-color .3s}
.com-body a:hover{color:var(--gold);border-color:var(--gold-dim)}
.com-body img{display:block;max-width:100%;height:auto;margin:36px 0 0;opacity:0.88;filter:brightness(0.92) contrast(1.05)}
/* Hide Substack's expand/fullscreen button */
.com-body button{display:none!important}
.com-body [class*="image-expand"]{display:none!important}
.com-body [class*="expand"]{display:none!important}
/* Caption — italic gold, separated from image */
.com-body figcaption,
.com-body .image-caption,
.com-body [class*="caption"]{
  display:block;
  font-style:italic;
  font-size:14px;
  color:rgba(197,165,90,0.45);
  letter-spacing:0.02em;
  margin:10px 0 36px;
  line-height:1.6;
}
/* Wrap img+caption together */
.com-body figure{margin:36px 0}
.com-body figure img{margin:0}

@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.content-loaded{animation:fadein .7s ease forwards}

.substack-link{display:inline-block;margin-top:40px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(197,165,90,0.22);text-decoration:none;border-bottom:1px solid rgba(197,165,90,0.1);padding-bottom:2px;transition:color .3s,border-color .3s}
.substack-link:hover{color:var(--gold-dim);border-color:var(--gold-dim)}

/* SKELETON - clearly visible against dark bg */
.sk{display:block;background:linear-gradient(90deg,rgba(197,165,90,0.08) 0%,rgba(197,165,90,0.18) 50%,rgba(197,165,90,0.08) 100%);background-size:200% 100%;animation:shim 1.6s ease-in-out infinite;border-radius:2px;height:15px;margin-bottom:15px}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* SUBSCRIBE */
.sub-wrap{margin-top:88px;padding-top:60px;border-top:1px solid rgba(197,165,90,0.06);text-align:center}
.sub-cta{font-style:italic;color:var(--gold);font-size:22px;line-height:1.5;margin-bottom:8px}
.sub-note{font-size:14px;color:rgba(226,217,200,0.2);margin-bottom:32px}
.sub-form{display:flex;flex-direction:column;align-items:center;gap:14px}
.sub-form input[type="email"]{width:300px;max-width:86vw;padding:13px 18px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'EB Garamond',serif;font-size:16px;outline:none;transition:border-color .3s;border-radius:0;-webkit-appearance:none}
.sub-form input::placeholder{color:rgba(226,217,200,0.18);font-style:italic}
.sub-form input:focus{border-color:rgba(197,165,90,0.38)}
.sub-form button{font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold-dim);border:1px solid rgba(197,165,90,0.22);background:transparent;padding:11px 44px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .3s,color .3s}
.sub-form button:hover{border-color:var(--gold-dim);color:var(--gold)}
.sub-confirm{display:none;font-style:italic;color:rgba(197,165,90,0.42);font-size:16px;line-height:2;animation:fadein .9s ease}
.sub-confirm .ref-mark{display:block;font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.16em;margin-top:6px;opacity:.5}

footer{text-align:center;padding:80px 24px 48px}
.f-name{font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(197,165,90,0.16)}
.f-mail{display:block;margin-top:7px;font-size:12px;color:rgba(197,165,90,0.14);text-decoration:none;transition:color .3s}
.f-mail:hover{color:var(--gold)}

@media(max-width:680px){main{padding:88px 22px 100px}nav{padding:0 22px}.date-nav{grid-template-columns:56px 1fr 56px}.com-body{font-size:17.5px}.sub-cta{font-size:20px}}
@media(max-width:420px){body{font-size:17px}.com-body{font-size:16.5px}.date-text{font-size:10.5px}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-home">Ishi Olam</a>
  <span class="nav-section">Daily Mass</span>
</nav>

<main>
  <div class="date-nav">
    <button class="nav-btn prev" id="prevBtn" onclick="go(1)">← Prev</button>
    <div class="date-center">
      <div class="date-text" id="dateTxt">—</div>
      <div class="lit-day" id="litDay"> </div>
    </div>
    <button class="nav-btn next" id="nextBtn" onclick="go(-1)">Next →</button>
  </div>

  <div class="com-label">Commentary</div>
  <div class="com-subtitle" id="comSubtitle"></div>
  <div class="com-body" id="comBody">
    <span class="sk" style="width:100%"></span>
    <span class="sk" style="width:91%"></span>
    <span class="sk" style="width:96%"></span>
    <span class="sk" style="width:85%"></span>
    <span class="sk" style="width:99%"></span>
    <span class="sk" style="width:70%"></span>
    <span class="sk" style="width:0%;height:8px;background:none"></span>
    <span class="sk" style="width:98%"></span>
    <span class="sk" style="width:93%"></span>
    <span class="sk" style="width:87%"></span>
    <span class="sk" style="width:100%"></span>
    <span class="sk" style="width:62%"></span>
  </div>

  <div class="sub-wrap">
    <div class="sub-cta">Receive this each morning.</div>
    <div class="sub-note">Daily commentary, delivered free.</div>
    <div class="sub-form" id="subForm">
      <input type="email" id="subEmail" placeholder="your email" autocomplete="email">
      <button onclick="handleSubscribe()">Enter</button>
    </div>
    <div class="sub-confirm" id="subConf">
      “There is a white stone with a name on it<br>that no one knows except the one who receives it.”
      <span class="ref-mark">Revelation 2:17</span>
    </div>
  </div>
</main>

<footer>
  <div class="f-name">Ishi Olam</div>
  <a href="/cdn-cgi/l/email-protection#6b1d45021803024504070a062b0c060a020745080406" class="f-mail"><span class="__cf_email__" data-cfemail="85f3abecf6edecabeae9e4e8c5e2e8e4ece9abe6eae8">[email&#160;protected]</span></a>
</footer>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
var SUBSTACK_SLUG = 'ishiolam';
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var WEEKDAY = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var allPosts = [];
var curIdx = 0;

function pad(n){ return String(n).padStart(2,'0'); }
function todayKey(){ var d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function fmtDate(str){ var p=str.split('-'); var dt=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])); return WEEKDAY[dt.getDay()]+', '+MONTHS[dt.getMonth()]+' '+parseInt(p[2])+', '+p[0]; }
function usccbUrl(str){ return 'https://bible.usccb.org/daily-bible-reading/'+str.replace(/-/g,''); }
function showToast(msg){
  var t = document.getElementById('navToast');
  if(!t){ t = document.createElement('div'); t.id='navToast'; t.style.cssText='position:fixed;bottom:40px;left:50%;transform:translateX(-50%);font-family:Cinzel,serif;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(197,165,90,0.5);padding:10px 28px;border:1px solid rgba(197,165,90,0.15);background:rgba(10,9,8,0.97);pointer-events:none;opacity:0;transition:opacity 0.4s ease;white-space:nowrap;z-index:200'; document.body.appendChild(t); }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._hide);
  t._hide = setTimeout(function(){ t.style.opacity='0'; }, 2200);
}

function go(delta){
  var next = curIdx + delta;
  if(next < 0){
    showToast('Most recent entry');
    return;
  }
  if(next >= allPosts.length){
    showToast('No earlier entries');
    return;
  }
  curIdx = next;
  render();
}

function setDate(key){
  document.getElementById('dateTxt').textContent = fmtDate(key);
}

function render(){
  var post = allPosts[curIdx];
  if(!post) return;
  document.getElementById('prevBtn').disabled = curIdx >= allPosts.length-1;
  document.getElementById('nextBtn').disabled = curIdx <= 0;
  setDate(post.dateKey);
  document.getElementById('litDay').textContent = post.litDay || ' ';
  try{ history.replaceState(null,'','?date='+post.dateKey); }catch(e){}

  var subtitle = document.getElementById('comSubtitle');
  var body = document.getElementById('comBody');

  subtitle.textContent = post.subtitle || '';
  body.classList.remove('content-loaded');
  body.innerHTML = post.html;
  if(post.link){
    var a = document.createElement('a');
    a.href=post.link; a.target='_blank'; a.rel='noopener';
    a.className='substack-link'; a.textContent='Read on Substack →';
    body.appendChild(a);
  }
  void body.offsetWidth; /* force reflow so animation restarts */
  body.classList.add('content-loaded');
}

function showSkeleton(){
  var body = document.getElementById('comBody');
  body.classList.remove('content-loaded');
  body.innerHTML =
    '<span class="sk" style="width:100%"></span>' +
    '<span class="sk" style="width:91%"></span>' +
    '<span class="sk" style="width:96%"></span>' +
    '<span class="sk" style="width:85%"></span>' +
    '<span class="sk" style="width:99%"></span>' +
    '<span class="sk" style="width:70%"></span>';
}

function getTag(item,tag){ var el=item.getElementsByTagName(tag)[0]; return el?(el.textContent||''):''; }
function getEncoded(item){ var el=item.getElementsByTagName('content:encoded')[0]||item.getElementsByTagName('encoded')[0]; return el?(el.textContent||''):''; }
function getLink(item){
  var el=item.getElementsByTagName('link')[0];
  if(!el) return '';
  if(el.textContent&&el.textContent.trim()) return el.textContent.trim();
  var n=el.nextSibling; if(n&&n.nodeType===3) return n.textContent.trim();
  return '';
}

function cleanHtml(html){
  if(!html) return '';

  // Substack's subscribe widget is always at the end of post content.
  // The safest removal: find the first <input and chop everything from there,
  // then remove any dangling open tags left behind.
  var inputIdx = html.search(/<input/i);
  if(inputIdx !== -1){
    // Walk back to find the opening of the containing block
    // (usually a <div or <p a few hundred chars back)
    var before = html.substring(0, inputIdx);
    // Trim any trailing incomplete block — find last complete closing tag
    var lastClose = Math.max(
      before.lastIndexOf('</p>'),
      before.lastIndexOf('</figure>'),
      before.lastIndexOf('</blockquote>'),
      before.lastIndexOf('</h1>'),
      before.lastIndexOf('</h2>'),
      before.lastIndexOf('</h3>')
    );
    if(lastClose !== -1){
      html = before.substring(0, lastClose + before.substring(lastClose).indexOf('>') + 1);
    } else {
      html = before;
    }
  }

  // Remove horizontal rules
  html = html.replace(/<hr[^>]*>/gi, '');

  // Remove empty paragraphs
  html = html.replace(/<p[^>]*>\s*(?:&nbsp;|&#160;)?\s*<\/p>/gi, '');

  // Remove Substack image expand buttons (small icon next to images)
  html = html.replace(/<button[^>]*>[\s\S]*?<\/button>/gi, '');

  return html.trim();
}

function parseItem(item){
  var title=getTag(item,'title');
  var m=title.match(/^(\d{4}-\d{2}-\d{2})\s*[-—–]\s*(.*)/);
  return {
    dateKey: m?m[1]:null,
    litDay:  m?m[2].trim():'',
    subtitle:getTag(item,'subtitle'),
    html:    cleanHtml(getEncoded(item)||getTag(item,'description')),
    link:    getLink(item)
  };
}

function processFeed(xml){
  var doc = new DOMParser().parseFromString(xml,'text/xml');
  var items = Array.from(doc.querySelectorAll('item'));
  if(!items.length) return [];
  return items.map(parseItem).filter(function(p){ return p.dateKey; })
              .sort(function(a,b){ return b.dateKey.localeCompare(a.dateKey); });
}

function showError(){
  document.getElementById('comBody').innerHTML='<p style="font-style:italic;color:rgba(197,165,90,0.3);font-size:16px">Could not load commentary. Please refresh or <a href="https://'+SUBSTACK_SLUG+'.substack.com" target="_blank" style="color:rgba(197,165,90,0.4);border-bottom:1px solid rgba(197,165,90,0.2)">read on Substack →</a>.</p>';
}

function loadAndRender(paramDate){
  var CACHE_KEY = 'ishi_feed_' + SUBSTACK_SLUG;
  var CACHE_TS  = 'ishi_feed_ts_' + SUBSTACK_SLUG;
  var MAX_AGE   = 15 * 60 * 1000; // 15 minutes

  // Try sessionStorage cache first — instant load
  try {
    var cached = sessionStorage.getItem(CACHE_KEY);
    var ts     = parseInt(sessionStorage.getItem(CACHE_TS) || '0');
    if(cached && (Date.now() - ts) < MAX_AGE){
      allPosts = JSON.parse(cached);
      if(allPosts.length){
        if(paramDate){
          var i=allPosts.findIndex(function(p){ return p.dateKey===paramDate; });
          curIdx=i>=0?i:0;
        } else {
          // Always show the most recent post first (index 0)
          curIdx=0;
        }
        render();
        // Silently refresh cache in background
        fetchFeed(function(posts){
          if(posts.length){
            try{ sessionStorage.setItem(CACHE_KEY, JSON.stringify(posts)); sessionStorage.setItem(CACHE_TS, String(Date.now())); }catch(e){}
          }
        });
        return;
      }
    }
  } catch(e){}

  // No cache — fetch fresh
  fetchFeed(function(posts){
    if(!posts.length){ showError(); return; }
    allPosts = posts;
    try{ sessionStorage.setItem(CACHE_KEY, JSON.stringify(posts)); sessionStorage.setItem(CACHE_TS, String(Date.now())); }catch(e){}
    if(paramDate){
      var i=allPosts.findIndex(function(p){ return p.dateKey===paramDate; });
      curIdx=i>=0?i:0;
    } else {
      // Find today's post first, fall back to most recent
      var today=todayKey();
      var todayIdx=allPosts.findIndex(function(p){ return p.dateKey===today; });
      curIdx=todayIdx>=0?todayIdx:0;
    }
    console.log('Posts loaded:', allPosts.length, allPosts.map(function(p){return p.dateKey;}));
    render();
  });
}

function fetchFeed(callback){
  var feedUrl = 'https://'+SUBSTACK_SLUG+'.substack.com/feed';
  var proxyUrl = 'https://feed-proxy.v-ishi-olam.workers.dev/?url='+encodeURIComponent(feedUrl);
  fetch(proxyUrl)
    .then(function(r){ return r.text(); })
    .then(function(xml){
      var posts = processFeed(xml);
      callback(posts);
    })
    .catch(function(){ callback([]); });
}

function init(){
  // Clear cache to force fresh fetch (remove this line once navigation is confirmed working)
  try{ sessionStorage.clear(); }catch(e){}
  var paramDate = new URLSearchParams(window.location.search).get('date');
  var startKey  = paramDate || todayKey();
  setDate(startKey);
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('prevBtn').disabled = true;
  loadAndRender(paramDate);
}

function handleSubscribe(){
  var email=document.getElementById('subEmail').value.trim();
  if(!email||!email.includes('@')) return;
  window.open('https://'+SUBSTACK_SLUG+'.substack.com/subscribe?email='+encodeURIComponent(email),'_blank');
  document.getElementById('subForm').style.display='none';
  document.querySelector('.sub-cta').style.display='none';
  document.querySelector('.sub-note').style.display='none';
  document.getElementById('subConf').style.display='block';
}

init();
</script>
</body>
</html>
