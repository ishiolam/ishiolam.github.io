<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Mass — Ishi Olam</title>
<meta name="description" content="Daily Mass readings commentary. Ishi Olam.">
<meta name="theme-color" content="#0A0908">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Ishi Olam">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A0908;--text:#E2D9C8;--gold:#C5A55A;--gold-dim:rgba(197,165,90,0.42);--fire:#8B6914;--surface:#12100E;--border:#1C1914}
html{background:var(--bg)}
body{background:var(--bg);color:rgba(226,217,200,0.97);font-family:'EB Garamond',Georgia,serif;font-size:20px;line-height:1.88;letter-spacing:0.012em;-webkit-font-smoothing:antialiased;overflow-x:hidden;font-feature-settings:'liga' 1,'kern' 1,'onum' 1;text-rendering:optimizeLegibility;opacity:0;transition:opacity 2.2s cubic-bezier(0.4,0,0.2,1)}
::selection{background:rgba(197,165,90,0.15);color:var(--text)}

/* ── PARCHMENT TEXTURE ── */
#textureOverlay{
  position:fixed;inset:0;pointer-events:none;z-index:999;
  mix-blend-mode:overlay;opacity:0.032;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
/* ── ANIMATED VIGNETTE ── */
#vignetteOverlay{
  position:fixed;inset:0;pointer-events:none;z-index:80;
  background:radial-gradient(circle at center,transparent 38%,rgba(5,4,3,0.92) 100%);
  animation:shadowBreath 12s ease-in-out infinite alternate;
}
@keyframes shadowBreath{0%{opacity:0.82}100%{opacity:1}}
/* ── CURSOR READER GLOW ── */
#readerGlow{
  position:fixed;top:0;left:0;
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(197,165,90,0.022) 0%,transparent 60%);
  border-radius:50%;pointer-events:none;z-index:70;
  transform:translate(-50%,-50%);
  mix-blend-mode:screen;opacity:0;transition:opacity 2s ease;
}

nav{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(10,9,8,0.97);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;padding:0 40px;z-index:100;border-bottom:1px solid rgba(197,165,90,0.05);transition:transform 0.4s ease,opacity 0.4s ease}
nav.hidden{transform:translateY(-100%);opacity:0}
.nav-home{font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.22em;color:rgba(197,165,90,0.32);text-transform:uppercase;text-decoration:none;transition:color .3s}
.nav-home:hover{color:var(--gold)}
.nav-section{font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(197,165,90,0.38)}

main{
  max-width:620px;margin:0 auto;padding:108px 36px 160px;
}

/* DATE NAV - always visible */
.date-nav{display:grid;grid-template-columns:76px 1fr 76px;align-items:start;margin-bottom:72px}
.nav-btn{background:none;border:none;cursor:pointer;font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(197,165,90,0.48);padding:6px 0;transition:color .4s;line-height:1}
.nav-btn:hover:not(:disabled){color:rgba(197,165,90,0.80)}
.nav-btn:hover:not(:disabled){color:var(--gold-dim)}
.nav-btn:disabled{opacity:.18;cursor:default;pointer-events:none}
.nav-btn.at-end{opacity:.22;cursor:default;pointer-events:none}
.nav-btn.at-end::after{content:' —';font-size:8px;letter-spacing:0.1em;opacity:0.6}
.nav-btn.prev{text-align:left}.nav-btn.next{text-align:right}
.date-center{text-align:center}
.date-text{font-family:'Cinzel',serif;font-size:11.5px;letter-spacing:0.19em;text-transform:uppercase;color:rgba(197,165,90,0.75);line-height:1;min-height:14px}
.lit-day{margin-top:12px;font-style:italic;font-size:15px;color:rgba(197,165,90,0.42);line-height:1.55;min-height:23px}
/* Canonical hour */
.canonical-hour{
  display:block;text-align:center;
  font-family:'Cinzel',serif;font-size:7px;letter-spacing:0.5em;
  text-transform:uppercase;color:rgba(197,165,90,0.36);
  margin-bottom:6px;user-select:none;
  transition:color 2s ease;
}



/* SUBTITLE - always visible */
.com-subtitle{
  font-family:'EB Garamond',Georgia,serif;
  font-style:italic;
  font-size:clamp(22px,3.2vw,30px);
  color:rgba(197,165,90,1);
  line-height:1.5;
  margin-bottom:22px;
  text-align:center;
  letter-spacing:0.03em;
  min-height:1.5em;
  animation:subtitleGlow 6s ease-in-out infinite;
}
@keyframes subtitleGlow{
  0%  {text-shadow:0 0 6px  rgba(197,165,90,0.0), 0 0 1px rgba(197,165,90,0.12);}
  28% {text-shadow:0 0 18px rgba(197,165,90,0.26),0 0 5px rgba(220,180,60,0.18),0 0 1px rgba(255,220,100,0.28);}
  55% {text-shadow:0 0 10px rgba(197,165,90,0.12),0 0 3px rgba(197,165,90,0.10);}
  82% {text-shadow:0 0 22px rgba(197,165,90,0.30),0 0 7px rgba(220,180,60,0.20),0 0 1px rgba(255,220,100,0.32);}
  100%{text-shadow:0 0 6px  rgba(197,165,90,0.0), 0 0 1px rgba(197,165,90,0.12);}
}
.com-subtitle:empty{display:none}

/* BODY - always visible, content fades in when loaded */
.com-body{font-size:19.5px;line-height:1.92}
.com-body.content-loaded{animation:inkFlicker 8s ease-in-out infinite;}
@keyframes inkFlicker{
  0%  {color:rgba(226,217,200,0.93);text-shadow:0 0 6px rgba(210,150,30,0.0),0 1px 2px rgba(197,165,90,0.03);}
  22% {color:rgba(232,222,207,0.97);text-shadow:0 0 12px rgba(210,150,30,0.06),0 1px 5px rgba(197,165,90,0.09),-1px 0 8px rgba(190,130,20,0.03);}
  50% {color:rgba(228,218,202,0.95);text-shadow:0 0 8px rgba(210,150,30,0.03),0 1px 3px rgba(197,165,90,0.06);}
  78% {color:rgba(234,224,210,0.98);text-shadow:0 0 16px rgba(220,155,25,0.08),0 1px 7px rgba(197,165,90,0.11),1px 0 10px rgba(190,130,20,0.04);}
  100%{color:rgba(226,217,200,0.94);text-shadow:0 0 6px rgba(210,150,30,0.01),0 1px 2px rgba(197,165,90,0.04);}
}
.com-body p{margin-bottom:44px;position:relative;}
.com-body p+p::before{
  content:'';
  display:block;
  width:24px;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(197,165,90,0.10),transparent);
  margin:0 auto -36px;
  position:relative;
  top:-22px;
}
.com-body p:last-child{margin-bottom:0}
.com-body em{
  color:var(--gold);font-style:italic;
  background:linear-gradient(
    105deg,
    var(--gold) 0%,
    rgba(255,240,160,1) 40%,
    var(--gold) 60%,
    rgba(180,140,60,0.9) 100%
  );
  background-size:300% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:goldLeaf 7s ease-in-out infinite;
}
@keyframes goldLeaf{
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}
.com-body strong{color:rgba(226,217,200,0.9);font-weight:500}
.com-body h2,.com-body h3{
  font-family:'Cinzel',serif;font-weight:400;
  color:rgba(197,165,90,0.88);
  font-size:15px;letter-spacing:0.08em;
  margin:42px 0 16px;
  text-align:center;
  text-shadow:0 0 20px rgba(197,165,90,0.20),0 0 1px rgba(197,165,90,0.35);
}
.com-body blockquote{
  border:none;padding:18px 0 8px;margin:52px 0;
  font-style:italic;color:rgba(197,165,90,0.65);
  font-size:1.15em;line-height:1.75;text-align:center;position:relative;
}
blockquote::before{
  content:'✦';
  display:block;
  font-size:9px;
  letter-spacing:0.4em;
  color:rgba(197,165,90,0.25);
  margin-bottom:18px;
  font-style:normal;
}
.com-body blockquote::before,.com-body blockquote::after{content:"";display:block;height:1px;background:linear-gradient(90deg,transparent,rgba(197,165,90,0.2),transparent);margin:16px auto;width:60%}
.com-body a{color:var(--gold-dim);text-decoration:none;border-bottom:1px solid rgba(197,165,90,0.18);transition:color .3s,border-color .3s}
.com-body a:hover{color:var(--gold);border-color:var(--gold-dim)}
.com-body img{display:block;max-width:100%;height:auto;margin:36px 0 0;opacity:0.88;filter:brightness(0.92) contrast(1.05)}
/* Hide Substack's expand/fullscreen button */
.com-body button{display:none!important}
.com-body [class*="image-expand"]{display:none!important}
.com-body [class*="expand"]{display:none!important}
/* Caption — italic gold, separated from image */
.com-body figcaption,
.com-body .image-caption,
.com-body [class*="caption"]{
  display:block;
  font-style:italic;
  font-size:14px;
  color:rgba(197,165,90,0.45);
  letter-spacing:0.02em;
  margin:10px 0 36px;
  line-height:1.6;
}
/* Wrap img+caption together */
.com-body figure{margin:36px 0}
.com-body figure img{margin:0}

@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* content-loaded arrival handled by pageIn on #contentRegion */

.substack-link{display:inline-block;margin-top:52px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(197,165,90,0.40);text-decoration:none;border-bottom:1px solid rgba(197,165,90,0.20);padding-bottom:2px;transition:color .4s,border-color .4s}
.substack-link:hover{color:var(--gold-dim);border-color:var(--gold-dim)}
.substack-link::before{content:'✠';display:block;font-size:11px;color:rgba(197,165,90,0.35);margin-bottom:18px;letter-spacing:0.3em;text-align:center;border-bottom:none}

/* SKELETON - clearly visible against dark bg */

/* SUBSCRIBE */
.sub-wrap{margin-top:130px;padding-top:0;border-top:none;text-align:center}
.sub-cta{font-style:italic;color:rgba(197,165,90,0.45);font-size:16px;line-height:1.8;margin-bottom:28px;font-weight:400}
.sub-form{display:flex;flex-direction:column;align-items:center;gap:14px}
.sub-form input[type="email"]{width:260px;max-width:82vw;padding:10px 0;background:transparent;border:none;border-bottom:1px solid rgba(197,165,90,0.12);color:rgba(226,217,200,0.6);font-family:'EB Garamond',serif;font-size:15px;font-style:italic;outline:none;transition:border-color .4s;border-radius:0;-webkit-appearance:none;text-align:center}
.sub-form input::placeholder{color:rgba(226,217,200,0.35);font-style:italic;letter-spacing:0.05em}
.sub-form input:focus{border-color:rgba(197,165,90,0.3)}
.sub-form button{font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:rgba(197,165,90,0.25);border:none;background:transparent;padding:10px 0;cursor:pointer;transition:color .3s;display:block;margin:14px auto 0}
.sub-form button:hover{color:rgba(197,165,90,0.55)}
.sub-confirm{
  visibility:hidden;
  font-style:italic;
  color:rgba(197,165,90,0.55);
  font-size:17px;
  line-height:2;
  opacity:0;
  transition:opacity 2s ease, visibility 0s linear 2s;
}
.sub-confirm.visible{
  visibility:visible;
  opacity:1;
  transition:opacity 2s ease;
}
.sub-confirm.visible{visibility:visible;opacity:1;transition:opacity 1.4s ease;max-height:200px;overflow:visible}
.sub-confirm .ref-mark{display:block;font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.16em;margin-top:6px;opacity:.5}

footer{text-align:center;padding:80px 24px 48px}
.f-name{font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(197,165,90,0.38)}
.f-mail{display:block;margin-top:8px;font-family:'EB Garamond',serif;font-style:italic;font-size:13px;color:rgba(197,165,90,0.30);text-decoration:none;transition:color .4s;letter-spacing:0.04em}
.f-mail:hover{color:rgba(197,165,90,0.65)}

@media(max-width:680px){main{padding:88px 22px 100px}nav{padding:0 22px}.date-nav{grid-template-columns:68px 1fr 68px}.com-body{font-size:17.5px}.sub-cta{font-size:15px}}
@media(max-width:420px){body{font-size:17px}.com-body{font-size:16.5px}.date-text{font-size:10.5px}}

/* Drop cap */
.com-body.content-loaded > p:first-of-type::first-letter{
  float:left;
  font-family:'Cinzel',serif;
  font-size:3.8em;
  line-height:0.85;
  color:var(--gold);
  margin:0.08em 0.13em -0.05em 0;
  font-weight:400;
  opacity:0.92;
  padding-top:0.06em;
  text-shadow:
    0 0 10px rgba(197,165,90,0.32),
    0 0 24px rgba(197,165,90,0.10),
    0 0 1px rgba(197,165,90,0.55);
}
/* Reading progress bar */
/* ── CANDLELIGHT ── */
#candleCanvas{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:2;
  opacity:0;
  transition:opacity 3.5s ease;
  mix-blend-mode:screen;
}

#readProgress{position:fixed;top:0;left:0;height:2px;width:0%;
  background:linear-gradient(90deg,rgba(197,165,90,0.3),rgba(197,165,90,0.8));
  z-index:200;transition:width 0.1s linear;pointer-events:none;}
:root{--season-glow:rgba(139,105,20,0.045)}
main::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at center,var(--season-glow) 0%,transparent 68%);
  pointer-events:none;z-index:0;transition:background 2s ease;
}
main{position:relative;z-index:1;}

/* Date as inscription */
.date-center{position:relative;padding:0 8px}
.date-center::before,.date-center::after{
  content:'';display:block;height:1px;
  background:linear-gradient(90deg,transparent,rgba(197,165,90,0.25),transparent);
  margin:0 auto;width:80%;
}
.date-center::before{margin-bottom:14px}
.date-center::after{margin-top:14px}
/* Liturgical season stripe above date */
.season-stripe{
  display:block;width:24px;height:2px;
  background:var(--season-color,rgba(197,165,90,0.3));
  margin:0 auto 16px;
  transition:background 2s ease;
}

/* Paragraph scroll reveal — only active after load */
.com-body.content-loaded p,
.com-body.content-loaded blockquote,
.com-body.content-loaded figure,
.com-body.content-loaded h2,
.com-body.content-loaded h3{
  opacity:0.18;
  transform:translateY(5px);
  transition:opacity 1.4s cubic-bezier(0.25,0,0.1,1), transform 1.6s cubic-bezier(0.25,0,0.1,1);
}
.com-body.content-loaded p.revealed,
.com-body.content-loaded blockquote.revealed,
.com-body.content-loaded figure.revealed,
.com-body.content-loaded h2.revealed,
.com-body.content-loaded h3.revealed{
  opacity:1;
  transform:none;
}
/* First paragraph — always revealed immediately */
.com-body.content-loaded p:first-of-type{
  opacity:1 !important;
  transform:none !important;
}

/* Candle flicker — imperceptible breathing */
@keyframes flicker{
  0%,100%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  25%{opacity:0.88;transform:translate(-50%,-50%) scale(1.015)}
  50%{opacity:0.95;transform:translate(-50%,-50%) scale(0.992)}
  75%{opacity:0.91;transform:translate(-50%,-50%) scale(1.008)}
}
main::before{animation:flicker 4.8s ease-in-out infinite}

/* Edge vignette — draws eye to text */
body::after{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(5,4,3,0.55) 100%);
  pointer-events:none;z-index:50;
}



/* Incipit — the mark that says: here it begins */
#readingTime{
  display:block;
  text-align:center;
  font-family:'Cinzel',serif;
  font-size:7.5px;
  letter-spacing:0.45em;
  text-transform:uppercase;
  color:rgba(197,165,90,0.32);
  margin:-18px 0 32px;
  opacity:0;
  transition:opacity 1.8s ease;
}
#readingTime.visible{opacity:1;}
.incipit{
  display:block;text-align:center;
  font-size:14px;
  color:rgba(197,165,90,0.50);
  letter-spacing:0.5em;
  margin:28px 0 36px;
  user-select:none;
  text-shadow:0 0 14px rgba(197,165,90,0.18);
}


/* ── TIME GREETING ── */
.time-greeting{
  display:block;text-align:center;
  font-family:'Cinzel',serif;font-size:7.5px;letter-spacing:0.38em;
  text-transform:uppercase;color:rgba(197,165,90,0.18);
  margin-bottom:10px;
  transition:opacity 1.5s ease;
  min-height:0;
}

/* ── MANUSCRIPT MARGINALIA ── */
.marginalia{
  position:fixed;
  right:calc(50% + 330px); /* outer left margin */
  font-family:'EB Garamond',serif;
  font-style:italic;
  font-size:9.5px;
  color:rgba(197,165,90,0.12);
  letter-spacing:0.04em;
  line-height:1.5;
  writing-mode:horizontal-tb;
  pointer-events:none;
  z-index:5;
  max-width:90px;
  text-align:right;
  transition:opacity 3s ease;
  user-select:none;
}
@media(max-width:1100px){ .marginalia{ display:none; } }

/* ── MARGIN WHISPER ── */
#marginWhisper{
  position:fixed;left:18px;top:50%;
  transform:translateY(-50%) rotate(-90deg);
  font-family:'EB Garamond',serif;font-size:11px;
  color:rgba(197,165,90,0.06);
  letter-spacing:0.25em;pointer-events:none;
  z-index:2;white-space:nowrap;
  transition:opacity 3s ease;
  user-select:none;
}

/* ── GOLD DUST CANVAS ── */
#dustCanvas{
  position:fixed;inset:0;
  pointer-events:none;z-index:1;
  opacity:1;
}
/* Star field — fixed, behind everything */
#starCanvas{
  position:fixed;inset:0;
  pointer-events:none;z-index:0;
  opacity:1;

  mix-blend-mode:screen;
}

/* ── BURNING BUSH — the light, not the flame ── */
@keyframes bushRadiance{
  0%  {opacity:0.55; transform:scale(0.92)}
  35% {opacity:0.88; transform:scale(1.01)}
  65% {opacity:0.72; transform:scale(0.97)}
  100%{opacity:1.0;  transform:scale(1.06)}
}

/* ── SUBTITLE TYPEWRITER ── */
.com-subtitle{cursor:default}
.subtitle-cursor{
  display:inline-block;width:1px;height:0.9em;
  background:rgba(197,165,90,0.4);
  margin-left:2px;vertical-align:middle;
  animation:blink-cur 0.9s ease infinite;
}
@keyframes blink-cur{0%,100%{opacity:0}50%{opacity:1}}

/* ── HEARTBEAT on season stripe ── */
@keyframes heartbeat{
  0%{transform:scaleX(1);opacity:1}
  30%{transform:scaleX(2.2);opacity:0.9}
  60%{transform:scaleX(1.1);opacity:1}
  100%{transform:scaleX(1);opacity:1}
}
.season-stripe.pulse{animation:heartbeat 0.85s ease forwards}

/* ── END MARK ── */
#endMark{
  display:block;text-align:center;
  font-size:11px;color:rgba(197,165,90,0);
  margin-top:52px;letter-spacing:0.4em;
  transition:color 3.5s ease;
  user-select:none;
}
#endMark.visible{color:rgba(197,165,90,0.38)}

/* ── OPENING ANTIPHON ── */
#antiphon{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  z-index:500;pointer-events:none;
  opacity:0;transition:opacity 1.6s ease;
}
#antiphon span{
  font-family:'EB Garamond',serif;
  font-style:italic;
  font-size:clamp(15px,2.2vw,22px);
  color:rgba(197,165,90,0.55);
  letter-spacing:0.08em;
  text-align:center;
  line-height:1.8;
}

/* ── RETURN RECOGNITION ── */
#returnGreet{
  position:fixed;top:70px;left:50%;transform:translateX(-50%);
  font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.3em;
  text-transform:uppercase;color:rgba(197,165,90,0);
  transition:color 1.5s ease;z-index:99;pointer-events:none;
  white-space:nowrap;
}
#returnGreet.visible{color:rgba(197,165,90,0.3)}

/* ── FOOTER VERSE STILL ── */
.f-verse-still{
  font-family:'Cinzel',serif;font-size:8px;
  letter-spacing:0.18em;color:rgba(197,165,90,0.12);
  margin-left:6px;
}
.f-verse{
  font-style:italic;
  font-size:15px;
  color:rgba(197,165,90,0.45);
  line-height:1.9;

/* ── BOOK SPINE — left edge binding ── */
body::before{
  content:'';position:fixed;left:0;top:0;bottom:0;width:1px;
  background:linear-gradient(180deg,transparent,rgba(197,165,90,0.12) 20%,rgba(197,165,90,0.18) 50%,rgba(197,165,90,0.12) 80%,transparent);
  z-index:50;pointer-events:none;
}

/* Drop cap stands alone — first paragraph needs no additional treatment */
.com-body.content-loaded > p:first-of-type{

}

/* ── READING TIME ── */
.reading-time{
  display:block;text-align:center;

/* ── IMAGE VEIL REVEAL ── */
.com-body img{

}
.com-body img.unveiled{

}

/* ── PAGE TURN — 3D perspective on navigation ── */
#contentRegion{
  perspective:1200px;
  transform-style:preserve-3d;
  opacity:0;
  transition:opacity 4s cubic-bezier(0.16,1,0.3,1);
}
#contentRegion.turning-out{
  animation:pageOut 0.8s cubic-bezier(0.4,0,1,1) forwards;
}
#contentRegion.turning-in{
  animation:pageIn 3.5s cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes pageOut{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-8px);opacity:0}}100%{opacity:0;transform:translateY(8px) scale(0.99)}}
@keyframes pageIn{0%{transform:translateY(12px);opacity:0.01}100%{transform:translateY(0);opacity:1}}100%{opacity:1;transform:translateY(0)}}

/* ── SUBSCRIBE — hidden until earned ── */
.sub-wrap{
  visibility:hidden;opacity:0;
  transition:opacity 1.4s ease, visibility 0s linear 1.4s;
}
.sub-wrap.earned{

}

/* ── PERIODIC VEIL ── */

  );

}

/* ── FOCUS MODE ── */
body.focus-mode nav,
body.focus-mode .date-nav,
body.focus-mode #dustCanvas,
body.focus-mode footer,
body.focus-mode .sub-wrap{

}

body.focus-mode #marginWhisper{

}

}

/* ── FOCUS HINT ── */
#focusHint{

/* ── BELL BUTTON ── */

#bellBtn:hover{opacity:0.5}

/* ── FOCUS HINT: desktop only ── */
@media(max-width:680px){#focusHint{}
/* ── PREFERS REDUCED MOTION ── */
@media(prefers-reduced-motion:reduce){
  body{transition:none!important;opacity:1!important}
  #contentRegion.turning-out,#contentRegion.turning-in{animation:none!important}
  #contentRegion.turning-out{opacity:0!important}

  .com-body.content-loaded p,.com-body.content-loaded blockquote,.com-body.content-loaded figure,.com-body.content-loaded h2,.com-body.content-loaded h3{opacity:1!important;transform:none!important;transition:none!important}
  main::before{animation:none!important}

<script>
// ════════════════════════════════════════════════════════
// CANDLELIGHT — a real flame just below the frame
// The source is located. The warmth falls off correctly.
// Color temperature shifts as real candlelight does.
// ════════════════════════════════════════════════════════
(function(){
  var cv=document.getElementById('candleCanvas');
  if(!cv) return;
  var ctx=cv.getContext('2d'), W, H;
  function resize(){ W=cv.width=window.innerWidth; H=cv.height=window.innerHeight; }
  window.addEventListener('resize',resize,{passive:true}); resize();

  if(_prefersReducedMotion){
    // Static: warm pool from bottom center
    var g=ctx.createRadialGradient(W*.5,H*.88,0,W*.5,H*.88,H*.7);
    g.addColorStop(0,  'rgba(220,145,25,0.10)');
    g.addColorStop(0.3,'rgba(190,120,18,0.055)');
    g.addColorStop(0.6,'rgba(155,95,12,0.022)');
    g.addColorStop(1,  'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H); return;
  }

  // Three independent oscillators — interference = organic life
  var t1=Math.random()*Math.PI*2; // slow breath  ~5s
  var t2=Math.random()*Math.PI*2; // medium pulse ~2s
  var t3=Math.random()*Math.PI*2; // fast flicker ~0.7s
  var td=Math.random()*Math.PI*2; // source drift

  function candleDraw(){
    t1+=0.012;  // ~5s cycle
    t2+=0.028;  // ~2s cycle
    t3+=0.088;  // ~0.7s cycle
    td+=0.005;  // slow drift

    ctx.clearRect(0,0,W,H);

    // Source position — flame is just below and slightly left of center
    // It drifts a little, like a flame in a draft
    var sx = W*0.48 + Math.sin(td)*W*0.018 + Math.sin(td*2.1)*W*0.008;
    var sy = H*0.92 + Math.sin(td*0.8)*H*0.012; // below the reading area

    // Composite intensity — three oscillators interfering
    // This is what makes it feel alive rather than mechanical
    var breath  = 0.78 + Math.sin(t1)*0.14 + Math.sin(t1*1.8)*0.06;
    var pulse   = 0.90 + Math.sin(t2)*0.07 + Math.sin(t2*2.3)*0.03;
    var flicker = 0.95 + Math.sin(t3)*0.03 + Math.sin(t3*1.4)*0.02;
    var I = breath * pulse * flicker; // 0.6 – 1.05 range

    // Color temperature oscillates between warm orange and cooler gold
    // Real candles shift color as the flame height changes
    var warmth = 0.5 + Math.sin(t1*0.7 + t2*0.3)*0.5; // 0→1
    var r1 = Math.floor(215 + warmth*18);  // 215–233
    var g1 = Math.floor(138 + warmth*14);  // 138–152
    var b1 = Math.floor(18  - warmth*8);   // 10–18

    // ── Layer 1: Wide sacred warmth — the room itself ──
    // Reaches from the source upward across the entire page
    var rA = H * 0.92;
    var gA = ctx.createRadialGradient(sx, sy, 0, sx, sy, rA);
    gA.addColorStop(0,    'rgba('+r1+','+g1+','+b1+','+(0.11*I).toFixed(4)+')');
    gA.addColorStop(0.18, 'rgba(200,128,20,'+(0.072*I).toFixed(4)+')');
    gA.addColorStop(0.40, 'rgba(175,108,16,'+(0.040*I).toFixed(4)+')');
    gA.addColorStop(0.65, 'rgba(148,90,12,' +(0.018*I).toFixed(4)+')');
    gA.addColorStop(0.85, 'rgba(120,72,8,'  +(0.007*I).toFixed(4)+')');
    gA.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle=gA; ctx.fillRect(0,0,W,H);

    // ── Layer 2: Mid warmth — where the manuscript lies ──
    // Centered on the reading area, slightly above source
    var midY = H * 0.55;
    var rB = Math.min(W*0.52, H*0.55);
    var gB = ctx.createRadialGradient(sx, midY, 0, sx, midY, rB);
    gB.addColorStop(0,   'rgba('+r1+','+g1+','+b1+','+(0.075*I).toFixed(4)+')');
    gB.addColorStop(0.3, 'rgba(200,130,18,'+(0.040*I).toFixed(4)+')');
    gB.addColorStop(0.65,'rgba(165,105,14,'+(0.016*I).toFixed(4)+')');
    gB.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle=gB; ctx.fillRect(0,0,W,H);

    // ── Layer 3: Hot spot — the text column itself ──
    // Very tight. This is what makes the words feel inscribed in firelight.
    var colW = Math.min(W*0.28, 220);
    var gC = ctx.createRadialGradient(W*0.5, H*0.42, 0, W*0.5, H*0.46, colW);
    gC.addColorStop(0,   'rgba(235,165,35,'+(0.042*I).toFixed(4)+')');
    gC.addColorStop(0.4, 'rgba(210,140,24,'+(0.020*I).toFixed(4)+')');
    gC.addColorStop(0.8, 'rgba(180,115,16,'+(0.008*I).toFixed(4)+')');
    gC.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle=gC; ctx.fillRect(0,0,W,H);

    requestAnimationFrame(candleDraw);
  }
  candleDraw();

  window._candleBreath=function(dim){
    cv.style.transition='opacity 0.55s ease';
    cv.style.opacity=dim?'0.12':'1';
    if(dim) setTimeout(function(){
      cv.style.transition='opacity 1.1s ease';
      cv.style.opacity='1';
    },580);
  };
})();

// ════════════════════════════════════════════════════════
// STAR FIELD — ancient texts were copied under stars
// ════════════════════════════════════════════════════════
(function(){
  var sc=document.getElementById('starCanvas');
  if(!sc) return;
  var ctx=sc.getContext('2d'), W, H;
  function resize(){ W=sc.width=window.innerWidth; H=sc.height=window.innerHeight; }
  window.addEventListener('resize',resize,{passive:true}); resize();
  var stars=[];
  var count=Math.floor((W*H)/18000);
  for(var i=0;i<count;i++) stars.push({x:Math.random()*W,y:Math.random()*H*.75,r:Math.random()*.7+.1,o:Math.random()*.09+.02,sp:.004+Math.random()*.008,ph:Math.random()*Math.PI*2});
  if(_prefersReducedMotion){
    stars.forEach(function(s){ ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle='rgba(255,250,240,'+s.o.toFixed(3)+')'; ctx.fill(); }); return;
  }
  function starDraw(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(function(s){
      s.ph+=s.sp;
      var op=s.o*(.6+Math.sin(s.ph)*.4);
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,250,240,'+op.toFixed(3)+')'; ctx.fill();
    });
    requestAnimationFrame(starDraw);
  }
  starDraw();
})();



// ════════════════════════════════════════════════════════
// GOLD DUST PARTICLES
// ════════════════════════════════════════════════════════
(function(){
  if(_prefersReducedMotion) return;
  var cv=document.getElementById('dustCanvas');
  if(!cv) return;
  var ctx=cv.getContext('2d'), W, H;
  function resize(){ W=cv.width=window.innerWidth; H=cv.height=window.innerHeight; }
  window.addEventListener('resize',resize,{passive:true}); resize();
  function Dust(){ this.reset(true); }
  Dust.prototype.reset=function(init){
    this.x=Math.random()*W; this.y=init?Math.random()*H:H+8;
    this.r=Math.random()*.9+.15; this.vy=-(Math.random()*.04+.015);
    this.vx=(Math.random()-.5)*.06; this.ph=Math.random()*Math.PI*2;
    this.maxO=Math.random()*.045+.01; this.o=init?Math.random()*this.maxO:0;
    this.dying=false; this.fadeS=.0008;
  };
  Dust.prototype.update=function(){
    this.ph+=.008; this.y+=this.vy; this.x+=this.vx+Math.sin(this.ph)*.08;
    if(!this.dying&&this.o<this.maxO) this.o+=this.fadeS;
    if(this.y<H*.25) this.dying=true;
    if(this.dying) this.o-=this.fadeS*1.5;
    if(this.o<=0&&this.dying) this.reset(false);
  };
  Dust.prototype.draw=function(c){
    if(this.o<=0) return;
    c.fillStyle='rgba(197,165,90,'+this.o.toFixed(4)+')';
    c.beginPath(); c.arc(this.x,this.y,this.r,0,Math.PI*2); c.fill();
  };
  var dust=[];
  for(var i=0;i<38;i++) dust.push(new Dust());
  function dustDraw(){ ctx.clearRect(0,0,W,H); for(var i=0;i<dust.length;i++){ dust[i].update(); dust[i].draw(ctx); } requestAnimationFrame(dustDraw); }
  dustDraw();
})();

// ════════════════════════════════════════════════════════
// PERIODIC VEIL — incense haze every ~90 seconds
// ════════════════════════════════════════════════════════
(function(){
  if(_prefersReducedMotion) return;
  var veil=document.getElementById('veilOverlay'); if(!veil) return;
  function descend(){
    veil.style.background='radial-gradient(ellipse 100% 100% at 50% 50%,rgba(15,12,8,0.0) 0%,rgba(10,9,8,0.06) 100%)';
    veil.classList.add('descending');
    setTimeout(function(){ veil.classList.remove('descending'); },9000);
  }
  setTimeout(function(){ descend(); setInterval(descend,90000+Math.random()*30000); },40000+Math.random()*30000);
})();


var SUBSTACK_SLUG = 'ishiolam';
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var WEEKDAY = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var allPosts = [];
var curIdx = 0;
var _firstRender = true;
var _prefersReducedMotion = !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion:reduce)").matches);

function pad(n){ return String(n).padStart(2,'0'); }
function todayKey(){ var d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function fmtDate(str){ var p=str.split('-'); var dt=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])); return WEEKDAY[dt.getDay()]+', '+MONTHS[dt.getMonth()]+' '+parseInt(p[2])+', '+p[0]; }

function go(delta){
  if(!allPosts.length){ showToast('Loading…'); return; }
  var next = curIdx + delta;
  if(next < 0){
    showToast('You are at the most recent entry');
    return;
  }
  if(next >= allPosts.length){
    showToast('No earlier entries in the archive');
    return;
  }
  curIdx = next;
  render();
}
function setDate(key){
  document.getElementById('dateTxt').textContent = fmtDate(key);
}

// ── TYPEWRITER SUBTITLE ──
var _typeGen = 0;
var _typeTimer;
function typeSubtitle(text, el){
  _typeGen++;
  var gen = _typeGen;
  if(!el) return;
  el.textContent = '';
  el.style.display = text ? '' : 'none';
  if(!text) return;
  if(_prefersReducedMotion){ el.textContent = text; return; }
  var i = 0;
  function tick(){
    if(gen !== _typeGen) return; // navigation happened — abort
    if(i <= text.length){
      el.textContent = text.slice(0, i);
      i++;
      _typeTimer = setTimeout(tick, 38 + Math.random()*22);
    }
  }
  setTimeout(tick, 320);
}

function flameDip(){
  // Page breath — the room darkens between days, then opens again
  var body = document.body;
  body.style.transition = 'opacity 0.55s ease';
  body.style.opacity = '0.32';
  if(window._candleBreath) _candleBreath(true);
  setTimeout(function(){
    body.style.transition = 'opacity 1s ease';
    body.style.opacity = '1';
  }, 580);
}

function render(){
  var post = allPosts[curIdx];
  if(!post) return;
  if(!_firstRender) flameDip();

  var region = document.getElementById('contentRegion');
  if(region && !_firstRender){
    region.classList.remove('turning-in','turning-out');
    void region.offsetWidth;
    region.classList.add('turning-out');
  }
  var _td = _firstRender ? 80 : 480;
  _firstRender = false;

  setTimeout(function(){
    // Instant scroll + reset progress
    window.scrollTo(0,0);
    var rp=document.getElementById('readProgress'); if(rp) rp.style.width='0%';

    // Nav state
    document.getElementById('prevBtn').disabled = curIdx >= allPosts.length-1;
    document.getElementById('nextBtn').disabled = curIdx <= 0;
    setDate(post.dateKey);
    document.getElementById('litDay').textContent = post.litDay || '\u00a0';
    document.title = (post.litDay ? post.litDay + ' \u2014 ' : '') + 'Ishi Olam';
    applySeasonGlow(post.dateKey);
    applySeasonStripe(post.dateKey);
    var inc = document.getElementById('incipit');
    if(inc){
      var s2 = getLiturgicalSeason(post.dateKey);
      var ic = {lent:'rgba(120,80,160,0.35)',easter:'rgba(220,190,80,0.45)',advent:'rgba(90,65,130,0.35)',ordinary:'rgba(197,165,90,0.28)'};
      inc.style.color = ic[s2] || ic.ordinary;
    }
    updateNavLabels();
    try{ history.replaceState(null,'','?date='+post.dateKey); }catch(e){}

    // Populate content
    var subtitle = document.getElementById('comSubtitle');
    var body = document.getElementById('comBody');
    // Decode any HTML entities in subtitle (RSS may contain &#8217; etc.)
    var _rawSub = post.subtitle || '';
    if(_rawSub && _rawSub.includes('&')){
      var _dec = document.createElement('textarea');
      _dec.innerHTML = _rawSub;
      _rawSub = _dec.value;
    }
        typeSubtitle(_rawSub, subtitle);
    body.classList.remove('content-loaded');
    body.innerHTML = post.html;
    if(post.link){
      var a = document.createElement('a');
      a.href=post.link; a.target='_blank'; a.rel='noopener';
      a.className='substack-link'; a.textContent='Read on Substack \u2192';
      body.appendChild(a);
    }
    void body.offsetWidth;
    body.classList.add('content-loaded');
    setTimeout(initReveal, 60);
    setTimeout(initImageVeil, 80);
    setReadingTime(body.innerHTML);
    var rt=document.getElementById('readingTime');
    if(rt){ rt.classList.remove('visible'); void rt.offsetWidth; setTimeout(function(){rt.classList.add('visible');},180); }
    pulseStripe();
    showEndMark();
    hapticPulse();
    ringBell();
    // Light the candle when word first arrives
    if(document.getElementById('candleCanvas') && document.getElementById('candleCanvas').style.opacity!=='1'){
      var cc=document.getElementById('candleCanvas');

function getTag(item,tag){ var el=item.getElementsByTagName(tag)[0]; return el?(el.textContent||''):''; }
function getEncoded(item){ var el=item.getElementsByTagName('content:encoded')[0]||item.getElementsByTagName('encoded')[0]; return el?(el.textContent||''):''; }
function getLink(item){
  var el=item.getElementsByTagName('link')[0];
  if(!el) return '';
  if(el.textContent&&el.textContent.trim()) return el.textContent.trim();
  var n=el.nextSibling; if(n&&n.nodeType===3) return n.textContent.trim();
  return '';
}

function cleanHtml(html){
  if(!html) return '';

  // Substack's subscribe widget is always at the end of post content.
  // The safest removal: find the first <input and chop everything from there,
  // then remove any dangling open tags left behind.
  var inputIdx = html.search(/<input/i);
  if(inputIdx !== -1){
    // Walk back to find the opening of the containing block
    // (usually a <div or <p a few hundred chars back)
    var before = html.substring(0, inputIdx);
    // Trim any trailing incomplete block — find last complete closing tag
    var lastClose = Math.max(
      before.lastIndexOf('</p>'),
      before.lastIndexOf('</figure>'),
      before.lastIndexOf('</blockquote>'),
      before.lastIndexOf('</h1>'),
      before.lastIndexOf('</h2>'),
      before.lastIndexOf('</h3>')
    );
    if(lastClose !== -1){
      html = before.substring(0, lastClose + before.substring(lastClose).indexOf('>') + 1);
    } else {
      html = before;
    }
  }

  // Remove horizontal rules
  html = html.replace(/<hr[^>]*>/gi, '');

  // Remove empty paragraphs
  html = html.replace(/<p[^>]*>\s*(?:&nbsp;|&#160;)?\s*<\/p>/gi, '');

  // Remove Substack image expand buttons (small icon next to images)
  html = html.replace(/<button[^>]*>[\s\S]*?<\/button>/gi, '');

  return html.trim();
}

function parseItem(item){
  var title=getTag(item,'title');
  var m=title.match(/^(\d{4}-\d{2}-\d{2})\s*[-—–]\s*(.*)/);
  var rawHtml=cleanHtml(getEncoded(item)||getTag(item,'description'));
  // Subtitle: try explicit tag first, then itunes:subtitle, then
  // first <em> or <i> block in content that stands alone as a short phrase
  var sub = getTag(item,'subtitle') || getTag(item,'itunes:subtitle') || '';

  // Substack has no subtitle tag — extract first standalone italic phrase from body
  if(!sub){
    var emMatch = rawHtml.match(/<(?:em|i)[^>]*>([^<]{8,160})<\/(?:em|i)>/);
    if(emMatch && emMatch[1] && emMatch[1].split(' ').length <= 20){
      sub = emMatch[1];
      // Decode any entities in the extracted subtitle
      var tmp = document.createElement('textarea');
      tmp.innerHTML = sub;
      sub = tmp.value;
      // Remove from body so it doesn't appear twice
      rawHtml = rawHtml.replace(emMatch[0], '');
    }
  }

  return {
    dateKey: m?m[1]:null,
    litDay:  m?m[2].trim():'',
    subtitle: sub,
    html:    rawHtml,
    link:    getLink(item)
  };
}

function processFeed(xml){
  var doc = new DOMParser().parseFromString(xml,'text/xml');
  var items = Array.from(doc.querySelectorAll('item'));
  if(!items.length) return [];
  return items.map(parseItem).filter(function(p){ return p.dateKey; })
              .sort(function(a,b){ return b.dateKey.localeCompare(a.dateKey); });
}

function loadAndRender(paramDate){
  var CACHE_KEY = 'ishi_feed_v3_' + SUBSTACK_SLUG;
  var CACHE_TS  = 'ishi_feed_ts_v3_' + SUBSTACK_SLUG;
  var MAX_AGE   = 15 * 60 * 1000; // 15 minutes

  // Try sessionStorage cache first — instant load
  try {
    var cached = sessionStorage.getItem(CACHE_KEY);
    var ts     = parseInt(sessionStorage.getItem(CACHE_TS) || '0');
    if(cached && (Date.now() - ts) < MAX_AGE){
      allPosts = JSON.parse(cached);
      if(allPosts.length){
        if(paramDate){
          var i=allPosts.findIndex(function(p){ return p.dateKey===paramDate; });
          curIdx=i>=0?i:0;
        } else {
          var today=todayKey();
          var ti=allPosts.findIndex(function(p){return p.dateKey===today;});
          curIdx=ti>=0?ti:0;
        }
        render();
        document.getElementById('prevBtn').disabled = curIdx >= allPosts.length-1;
        document.getElementById('nextBtn').disabled = curIdx <= 0;
        // Silently refresh cache in background
        fetchFeed(function(posts){
          if(posts.length){
            try{ sessionStorage.setItem(CACHE_KEY, JSON.stringify(posts)); sessionStorage.setItem(CACHE_TS, String(Date.now())); }catch(e){}
          }
        });
        return;
      }
    }
  } catch(e){}

  // No cache — fetch fresh
  fetchFeed(function(posts){
    if(!posts.length){ showError(); return; }
    allPosts = posts;
    try{ sessionStorage.setItem(CACHE_KEY, JSON.stringify(posts)); sessionStorage.setItem(CACHE_TS, String(Date.now())); }catch(e){}
    if(paramDate){
      var i=allPosts.findIndex(function(p){ return p.dateKey===paramDate; });
      curIdx=i>=0?i:0;
    } else {
      // Find today's post first, fall back to most recent
      var today=todayKey();
      var todayIdx=allPosts.findIndex(function(p){ return p.dateKey===today; });
      curIdx=todayIdx>=0?todayIdx:0;
    }
    render();
  });
}

function fetchFeed(callback){
  var feedUrl = 'https://'+SUBSTACK_SLUG+'.substack.com/feed';
  var proxyUrl = 'https://feed-proxy.v-ishi-olam.workers.dev/?url='+encodeURIComponent(feedUrl);
  fetch(proxyUrl)
    .then(function(r){ return r.text(); })
    .then(function(xml){
      var posts = processFeed(xml);
      callback(posts);
    })
    .catch(function(){ callback([]); });
}

// ── Liturgical season detection ──
function getEaster(year){
  // Meeus/Jones/Butcher algorithm
  var a=year%19,b=Math.floor(year/100),c=year%100;
  var d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  var g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
  var i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;
  var m=Math.floor((a+11*h+22*l)/451);
  var month=Math.floor((h+l-7*m+114)/31);
  var day=((h+l-7*m+114)%31)+1;
  return new Date(year,month-1,day);
}

function getLiturgicalSeason(dateStr){
  var p=dateStr.split('-');
  var d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
  var year=d.getFullYear();
  var easter=getEaster(year);
  var easterMs=easter.getTime();
  var dMs=d.getTime();
  var day=86400000;

  // Ash Wednesday = 46 days before Easter
  var ashWed=new Date(easterMs - 46*day);
  // Pentecost = 49 days after Easter
  var pentecost=new Date(easterMs + 49*day);
  // Advent: 4 Sundays before Dec 25
  var christmas=new Date(year,11,25);
  var christmasDay=christmas.getDay();
  var advent=new Date(year,11,25-(christmasDay===0?28:christmasDay+21));
  // Christmas season ends Jan 13 (Baptism of the Lord area)
  var christmasEnd=new Date(year+1,0,13);

  if(dMs>=ashWed.getTime() && dMs<easterMs) return 'lent';
  if(dMs>=easterMs && dMs<pentecost.getTime()) return 'easter';
  if(dMs>=advent.getTime() || dMs<christmasEnd.getTime()) return 'advent';
  return 'ordinary';
}

// Paragraph candlelight reveal via IntersectionObserver
var _revealObserver;
function initReveal(){
  if(_revealObserver) _revealObserver.disconnect();
  var targets=document.querySelectorAll('.com-body p, .com-body blockquote, .com-body figure, .com-body h2, .com-body h3');
  if(!targets.length) return;
  _revealObserver=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting) e.target.classList.add('revealed');
    });
  },{threshold:0.12,rootMargin:'0px 0px -40px 0px'});
  targets.forEach(function(el,i){
    if(i===0){ el.classList.add('revealed'); }
    else { _revealObserver.observe(el); }
  });
}

        window.removeEventListener('scroll', _subScrollHandler);
      }
    }
  };
  window.addEventListener('scroll', _subScrollHandler, {passive:true});
  _subScrollHandler();
}

// ════════════════════════════════════════════════════════
// HAPTIC PULSE — body receives the new day
// ════════════════════════════════════════════════════════
var _userHasInteracted = false;
document.addEventListener('touchstart', function(){ _userHasInteracted=true; }, {once:true, passive:true});
document.addEventListener('click', function(){ _userHasInteracted=true; }, {once:true});
function hapticPulse(){
  try{ if(_userHasInteracted && navigator.vibrate) navigator.vibrate(40); }catch(e){}
}

// ════════════════════════════════════════════════════════
// FOCUS MODE — pure encounter
// ════════════════════════════════════════════════════════
var _focusMode = false;
function toggleFocus(){
  _focusMode = !_focusMode;
  document.body.classList.toggle('focus-mode', _focusMode);
  var hint = document.getElementById('focusHint');
  if(hint) hint.style.opacity = _focusMode ? '0' : '0.1';
  if(window._flameSetFocus) _flameSetFocus(_focusMode);
}
document.addEventListener('keydown', function(e){
  if(e.target.tagName === 'INPUT') return;
  if(e.key === 'f' || e.key === 'F') toggleFocus();
});

// ═══════════════════════════════════════════════════════
// BELL — a tone for the new day
// ═══════════════════════════════════════════════════════
var _bellEnabled = false;
var _audioCtx = null;

function getAudioCtx(){
  if(!_audioCtx){
    try{ _audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  }
  return _audioCtx;
}

function ringBell(){
  if(!_bellEnabled) return;
  var ctx = getAudioCtx();
  if(!ctx) return;
  var p = (ctx.state==='suspended') ? ctx.resume() : Promise.resolve();
  p.then(function(){
    var now = ctx.currentTime;
    // Bell timbre: fundamental + inharmonic overtones + sub-body
    // Ratios approximate a church bell's spectrum
    var partials=[
      {f:220,  a:0.055, type:'sine'},        // fundamental — lower, more sacred
      {f:220*2.756, a:0.022, type:'sine'},   // minor 10th — bell characteristic
      {f:220*5.404, a:0.010, type:'sine'},   // upper partial
      {f:110,  a:0.028, type:'triangle'},    // sub-body warmth
      {f:220*1.22,  a:0.014, type:'sine'},   // slight detuning for life
      {f:174,  a:0.018, type:'sine'}         // resonant undertone
    ];
    partials.forEach(function(partial){
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = partial.type||'sine';
      osc.frequency.setValueAtTime(partial.f, now);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(partial.a, now + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 2.4);
      osc.start(now);
      osc.stop(now + 2.5);
    });
  }).catch(function(){});
}

function toggleBell(){
  _bellEnabled = !_bellEnabled;
  if(_bellEnabled && !_audioCtx) getAudioCtx();
  var btn = document.getElementById('bellBtn');
  if(btn){
    var bs=btn.querySelector('span')||btn; bs.textContent = _bellEnabled ? '🔔' : '🔕';
    btn.classList.toggle('on', _bellEnabled);
  }
  try{ localStorage.setItem('ishi_bell', _bellEnabled?'1':'0'); }catch(e){}
}


// ════════════════════════════════════════════════════════
// CANONICAL HOUR — the ancient rhythm of prayer
// ════════════════════════════════════════════════════════
var CANONICAL_HOURS = [
  {start:0,  end:3,  name:'Vigils',  latin:'Vigilate et orate'},
  {start:3,  end:6,  name:'Vigils',  latin:'Vigilate et orate'},
  {start:6,  end:7,  name:'Lauds',   latin:'Domine, labia mea aperies'},
  {start:7,  end:9,  name:'Prime',   latin:'Deus in adiutorium meum intende'},
  {start:9,  end:12, name:'Terce',   latin:'Veni, Sancte Spiritus'},
  {start:12, end:14, name:'Sext',    latin:'Angelus Domini nuntiavit Mariae'},
  {start:14, end:16, name:'None',    latin:'Inclina, Domine, aurem tuam'},
  {start:16, end:20, name:'Vespers', latin:'Magnificat anima mea Dominum'},
  {start:20, end:24, name:'Compline',latin:'In manus tuas, Domine'},
];

function getCanonicalHour(){
  var h = new Date().getHours();
  for(var i=0;i<CANONICAL_HOURS.length;i++){
    if(h>=CANONICAL_HOURS[i].start && h<CANONICAL_HOURS[i].end)
      return CANONICAL_HOURS[i];
  }
  return CANONICAL_HOURS[0];
}

function applyCanonicalHour(){
  var el = document.getElementById('canonicalHour');
  if(!el) return;
  var ch = getCanonicalHour();
  el.textContent = ch.name;
}

// ════════════════════════════════════════════════════════
// OPENING ANTIPHON — the intonation before the word
// ════════════════════════════════════════════════════════
function showAntiphon(onDone){
  var wrap = document.getElementById('antiphon');
  var sp   = wrap ? wrap.querySelector('span') : null;
  if(!wrap||!sp){ if(onDone) onDone(); return; }
  var ch = getCanonicalHour();
  sp.textContent = ch.latin;
  // Page is dark. Antiphon surfaces slowly.
  setTimeout(function(){
    wrap.style.opacity = '1';
    // Hold in complete silence
    setTimeout(function(){
      wrap.style.opacity = '0';
      // Word arrives after antiphon fully dissolves
      setTimeout(function(){
        if(onDone) onDone();
      }, 1700); // 1.6s transition + small buffer
    }, 1800); // hold duration
  }, 800); // wait for page to be mostly dark/settled
}

// ════════════════════════════════════════════════════════
// ANGELUS — rings at 6am, noon, 6pm if bell is on
// Three groups of three strokes, then one long tone
// ════════════════════════════════════════════════════════
function ringAngelus(){
  if(!_bellEnabled) return;
  var ctx = getAudioCtx();
  if(!ctx) return;

  function singleStroke(delay){
    var p = (ctx.state==='suspended') ? ctx.resume() : Promise.resolve();
    p.then(function(){
      var now = ctx.currentTime + delay;
      [174, 174*2.756, 87].forEach(function(freq, fi){
        var gains = [0.22, 0.06, 0.09];
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = fi===2?'triangle':'sine';
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(gains[fi], now+0.04);
        gain.gain.exponentialRampToValueAtTime(0.0001, now+4);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(now); osc.stop(now+4.1);
      });
    }).catch(function(){});
  }

  // 3 × 3 strokes + pause + 1 long tone
  var times = [0, 1.4, 2.8,   5, 6.4, 7.8,   10, 11.4, 12.8,   16];
  times.forEach(function(t){ singleStroke(t); });
}

function checkAngelus(){
  var now = new Date();
  var h = now.getHours(), m = now.getMinutes();
  var isAngelus = (h===6||h===12||h===18) && m<=2;
  if(isAngelus){
    // Only ring once — check if already rung this hour
    var key = 'ishi_angelus_'+h;
    try{
      if(!sessionStorage.getItem(key)){
        sessionStorage.setItem(key,'1');
        setTimeout(ringAngelus, 1800); // slight delay after page settles
      }
    }catch(e){ ringAngelus(); }
  }
}
