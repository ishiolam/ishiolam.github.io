<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Mass — Ishi Olam</title>
<meta name="description" content="Daily Mass readings commentary. Ishi Olam.">
<meta name="theme-color" content="#0A0908">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Ishi Olam">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* ── THE ETHEAREAL VOID ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A0908;--text:#E2D9C8;--gold:#C5A55A;--gold-dim:rgba(197,165,90,0.42);--fire:#8B6914}
html{background:var(--bg)}
body{background:var(--bg);color:rgba(226,217,200,0.92);font-family:'EB Garamond',Georgia,serif;font-size:19.5px;line-height:1.86;letter-spacing:0.012em;-webkit-font-smoothing:antialiased;overflow-x:hidden;text-rendering:optimizeLegibility;opacity:0;transition:opacity 2.5s ease}
::selection{background:rgba(197,165,90,0.15);color:var(--text)}

/* ── SACRED TEXTURES & LIGHTING ── */
#textureOverlay {
  position: fixed; inset: 0; pointer-events: none; z-index: 999; mix-blend-mode: overlay; opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
}
#vignetteOverlay {
  position: fixed; inset: 0; pointer-events: none; z-index: 80;
  background: radial-gradient(circle at center, transparent 35%, rgba(5, 4, 3, 0.95) 100%);
  animation: shadowBreath 12s ease-in-out infinite alternate;
}
@keyframes shadowBreath { 0% { opacity: 0.85; } 100% { opacity: 1; } }

#readerGlow {
  position: fixed; top: 0; left: 0; width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(197, 165, 90, 0.03) 0%, transparent 60%);
  border-radius: 50%; pointer-events: none; z-index: 70; transform: translate(-50%, -50%);
  mix-blend-mode: screen; opacity: 0; transition: opacity 2s ease;
}

#fireGlow {
  position: fixed; bottom: -20vh; left: 50%; transform: translateX(-50%); width: 150vw; height: 80vh;
  pointer-events: none; z-index: 50; mix-blend-mode: color-dodge; 
  background: radial-gradient(ellipse at 50% 100%, rgba(255, 175, 30, 0.06) 0%, transparent 40%),
              radial-gradient(ellipse at 50% 100%, rgba(210, 125, 15, 0.04) 20%, transparent 60%);
  animation: holyBreath 8s ease-in-out infinite alternate;
}
@keyframes holyBreath {
  0%   { opacity: 0.5; transform: translateX(-50%) scale(0.99); }
  100% { opacity: 0.8; transform: translateX(-50%) scale(1.01); }
}

/* ── PARTICLE CANVASES ── */
#dustCanvas, #emberCanvas { position: fixed; inset: 0; pointer-events: none; }
#dustCanvas { z-index: 1; opacity: 0.6; }
#emberCanvas { z-index: 60; opacity: 0.7; mix-blend-mode: screen; }

/* ── NAVIGATION ── */
nav{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(10,9,8,0.9);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;padding:0 40px;z-index:100;border-bottom:1px solid rgba(197,165,90,0.03);}
.nav-home{font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.22em;color:rgba(197,165,90,0.32);text-transform:uppercase;text-decoration:none;transition:color .4s}
.nav-home:hover{color:var(--gold)}
.nav-section{font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(197,165,90,0.2)}
#bellBtn{background:none;border:none;cursor:pointer;font-size:12px;opacity:0.2;padding:4px 2px;transition:all .4s; color:inherit}
#bellBtn:hover{opacity:0.5;}
#bellBtn.on{opacity:0.8; text-shadow: 0 0 12px rgba(197,165,90,0.3);}

/* ── MAIN CONTENT ── */
main{max-width:620px;margin:0 auto;padding:120px 36px 160px; position:relative; z-index: 40;}
.date-nav{display:grid;grid-template-columns:76px 1fr 76px;align-items:start;margin-bottom:72px}
.nav-btn{background:none;border:none;cursor:pointer;font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(197,165,90,0.2);padding:6px 0;transition:color .4s;}
.nav-btn:hover:not(:disabled){color:var(--gold-dim)}
.nav-btn:disabled{opacity:.05;cursor:default;}
.nav-btn.prev{text-align:left}.nav-btn.next{text-align:right}
.date-center{text-align:center; position:relative;}
.date-center::before, .date-center::after{content:'';display:block;height:1px;background:linear-gradient(90deg,transparent,rgba(197,165,90,0.15),transparent);margin:0 auto;width:60%;}
.date-center::before{margin-bottom:14px} .date-center::after{margin-top:14px}
.date-text{font-family:'Cinzel',serif;font-size:11.5px;letter-spacing:0.19em;text-transform:uppercase;color:rgba(197,165,90,0.45);}
.lit-day{margin-top:12px;font-style:italic;font-size:15px;color:rgba(197,165,90,0.28);}

/* ── THE LIVING WORD ── */
#contentRegion{perspective:1200px; transform-style:preserve-3d;}
.incipit{display:block;text-align:center;font-size:13px;color:rgba(197,165,90,0.28);letter-spacing:0.5em;margin:32px 0 40px;user-select:none;}
.com-subtitle{font-style:italic;font-size:23px;color:rgba(197,165,90,0.65);line-height:1.6;margin-bottom:10px;text-align:center;letter-spacing:0.01em;}
.com-subtitle:empty{display:none}

.com-body{font-size:19.5px;line-height:1.92;}
.com-body.content-loaded { animation: inkFlicker 12s ease-in-out infinite alternate; }
/* Extremely subtle, slow breathing of the text */
@keyframes inkFlicker {
  0%   { text-shadow: 0 1px 4px rgba(197, 165, 90, 0.02); color: rgba(226, 217, 200, 0.88); }
  100% { text-shadow: 0 1px 8px rgba(197, 165, 90, 0.08); color: rgba(226, 217, 200, 0.95); }
}

.com-body p{margin-bottom:40px}
.com-body em{color:var(--gold);font-style:italic}
.com-body h2,.com-body h3{font-family:'Cinzel',serif;font-weight:400;color:var(--gold);font-size:16px;letter-spacing:0.05em;margin:36px 0 18px}
.com-body blockquote{border:none;padding:8px 0;margin:44px 0;font-style:italic;color:rgba(197,165,90,0.58);font-size:1.18em;line-height:1.7;text-align:center;}
.com-body > p:first-of-type::first-letter{float:left;font-family:'Cinzel',serif;font-size:4.8em;line-height:0.78;color:var(--gold);margin:0.06em 0.1em 0 0;}
.com-body a{color:var(--gold-dim);text-decoration:none;border-bottom:1px solid rgba(197,165,90,0.12);transition:all .4s}
.com-body a:hover{color:var(--gold); border-bottom-color: rgba(197,165,90,0.4);}

/* ── PAGE TRANSITIONS ── */
#contentRegion.turning-out{animation:pageOut 0.6s cubic-bezier(0.4,0,1,1) forwards;}
#contentRegion.turning-in{animation:pageIn 0.7s cubic-bezier(0,0,0.2,1) forwards;}
@keyframes pageOut{0%{opacity:1;transform:rotateX(0deg) translateY(0)}100%{opacity:0;transform:rotateX(2deg) translateY(10px) scale(0.99)}}
@keyframes pageIn{0%{opacity:0;transform:rotateX(-2deg) translateY(-10px) scale(0.99)}100%{opacity:1;transform:rotateX(0deg) translateY(0) scale(1)}}

/* ── SURREAL TOAST NOTIFICATION ── */
#toast {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  background: rgba(10, 9, 8, 0.85); border: 1px solid rgba(197, 165, 90, 0.1);
  color: rgba(197, 165, 90, 0.6); padding: 12px 28px; font-family: 'Cinzel', serif;
  font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; border-radius: 2px;
  pointer-events: none; opacity: 0; transition: opacity 1.2s ease; z-index: 1000;
  backdrop-filter: blur(8px); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}
#toast.show { opacity: 1; }

/* ── SUBSCRIPTION & FOOTER ── */
.sub-wrap{margin-top:140px;text-align:center;opacity:1;transition:opacity 1.4s ease;}
.sub-cta{font-style:italic;color:rgba(197,165,90,0.32);font-size:16px;margin-bottom:28px;}
.sub-form input[type="email"]{width:260px;padding:10px 0;background:transparent;border:none;border-bottom:1px solid rgba(197,165,90,0.15);color:rgba(226,217,200,0.8);font-family:'EB Garamond',serif;font-size:15px;font-style:italic;outline:none;text-align:center;transition:border-color .5s;}
.sub-form input:focus{border-color:rgba(197,165,90,0.4)}
.sub-form button{font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:rgba(197,165,90,0.25);border:none;background:transparent;padding:10px 0;cursor:pointer;display:block;margin:14px auto 0;transition:color .4s}
.sub-form button:hover{color:var(--gold-dim)}
.sub-confirm{display:none;font-style:italic;color:rgba(197,165,90,0.45);font-size:16px;line-height:2;}
.sub-confirm.visible{display:block;animation: fadeIn 2s ease forwards;}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

footer{text-align:center;padding:80px 24px 48px}
.f-name{font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(197,165,90,0.15)}
</style>
</head>
<body>

<div id="textureOverlay"></div>
<div id="vignetteOverlay"></div>
<div id="readerGlow" aria-hidden="true"></div>
<div id="fireGlow" aria-hidden="true"></div>

<canvas id="dustCanvas" aria-hidden="true"></canvas>
<canvas id="emberCanvas" aria-hidden="true"></canvas>

<nav>
  <a href="index.html" class="nav-home">Ishi Olam</a>
  <span class="nav-section">Daily Mass</span>
  <button id="bellBtn" onclick="toggleBell()" title="Sound on arrival" aria-label="Toggle arrival bell"><span aria-hidden="true">🔕</span></button>
</nav>

<main>
  <div class="date-nav">
    <button class="nav-btn prev" id="prevBtn" onclick="go(1)">← Prev</button>
    <div class="date-center">
      <div class="date-text" id="dateTxt">—</div>
      <div class="lit-day" id="litDay"> </div>
    </div>
    <button class="nav-btn next" id="nextBtn" onclick="go(-1)">Next →</button>
  </div>

  <div id="contentRegion">
    <div class="incipit" id="incipit">✠</div>
    <div class="com-subtitle" id="comSubtitle"></div>
    <div class="com-body" id="comBody">
      <div style="height:200px; display:flex; align-items:center; justify-content:center; opacity:0.15;">
         <span style="font-family:'Cinzel', serif; font-size:10px; letter-spacing:0.3em; color:var(--gold);">Seeking the Word...</span>
      </div>
    </div>
  </div>

  <div class="sub-wrap">
    <div class="sub-cta">If this found you —</div>
    <div class="sub-form" id="subForm">
      <input type="email" id="subEmail" placeholder="your email" autocomplete="email">
      <button onclick="handleSubscribe()">Enter</button>
    </div>
    <div class="sub-confirm" id="subConf">
      “There is a white stone with a name on it<br>that no one knows except the one who receives it.”<br>
      <span style="font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.2em; opacity:0.4; display:block; margin-top:10px;">Revelation 2:17</span>
    </div>
  </div>
</main>

<footer>
  <div class="f-name">Ishi Olam</div>
</footer>

<div id="toast" aria-hidden="true"></div>

<script>
/* ── CORE VARIABLES ── */
var SUBSTACK_SLUG = 'ishiolam';
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var WEEKDAY = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var allPosts = [];
var curIdx = 0;
var _firstRender = true;
var _bellEnabled = false;
var audioCtx;

/* ── PURE MATH SYNTHESIZER (THE BELL) ── */
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function ringSacredBell() {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  var filter = audioCtx.createBiquadFilter();

  osc.type = 'sine';
  osc.frequency.setValueAtTime(174, audioCtx.currentTime); 
  osc.frequency.exponentialRampToValueAtTime(170, audioCtx.currentTime + 8);

  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(600, audioCtx.currentTime);
  filter.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 8);

  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05); 
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 9); 

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 9);
}

function toggleBell() {
  initAudio();
  _bellEnabled = !_bellEnabled;
  var btn = document.getElementById('bellBtn');
  if(_bellEnabled) {
    btn.classList.add('on');
    btn.innerHTML = '<span aria-hidden="true">🔔</span>';
    showToast("Sanctuary bell enabled.");
    ringSacredBell();
  } else {
    btn.classList.remove('on');
    btn.innerHTML = '<span aria-hidden="true">🔕</span>';
    showToast("Sanctuary bell silenced.");
  }
}

/* ── TOAST NOTIFICATIONS ── */
var toastTimeout;
function showToast(message) {
  var toast = document.getElementById('toast');
  if (!toast) return; 
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(function() { toast.classList.remove('show'); }, 4000);
}

/* ── CURSOR ILLUMINATION ── */
document.addEventListener('mousemove', function(e) {
  var glow = document.getElementById('readerGlow');
  if (glow) {
    glow.style.opacity = '1';
    glow.style.left = e.clientX + 'px';
    glow.style.top = e.clientY + 'px';
  }
});
document.addEventListener('mouseleave', function() {
  var glow = document.getElementById('readerGlow');
  if (glow) glow.style.opacity = '0';
});

/* ── SUBSCRIPTION ── */
function handleSubscribe() {
  var email = document.getElementById('subEmail').value;
  if(email && email.includes('@')) {
    document.getElementById('subForm').style.display = 'none';
    document.getElementById('subConf').classList.add('visible');
    if(_bellEnabled) ringSacredBell();
  } else {
    showToast("Please enter a valid email to enter.");
  }
}

/* ── RSS & NAVIGATION LOGIC ── */
function pad(n){ return String(n).padStart(2,'0'); }
function todayKey(){ var d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function fmtDate(str){ 
  if(!str) return "";
  var p=str.split('-'); 
  if(p.length !== 3) return str;
  var dt=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])); 
  return WEEKDAY[dt.getDay()]+', '+MONTHS[dt.getMonth()]+' '+parseInt(p[2])+', '+p[0]; 
}

function go(delta){
  var next = curIdx + delta;
  if(next < 0) { showToast("You have reached the newest reading."); return; }
  if(next >= allPosts.length) { showToast("You have reached the oldest reading."); return; }
  curIdx = next;
  render();
}

function render(){
  var post = allPosts[curIdx];
  if(!post) return;

  var region = document.getElementById('contentRegion');
  if(region && !_firstRender){
    region.classList.remove('turning-in','turning-out');
    void region.offsetWidth;
    region.classList.add('turning-out');
  }
  
  var _td = _firstRender ? 0 : 700;
  _firstRender = false;

  setTimeout(function(){
    window.scrollTo({ top: 0, behavior: 'smooth' });
    
    document.getElementById('prevBtn').disabled = curIdx >= allPosts.length - 1;
    document.getElementById('nextBtn').disabled = curIdx <= 0;
    
    document.getElementById('dateTxt').textContent = fmtDate(post.dateKey);
    document.getElementById('litDay').textContent = post.litDay || '\u00a0';
    document.title = (post.litDay ? post.litDay + ' — ' : '') + 'Ishi Olam';
    try{ history.replaceState(null,'','?date='+post.dateKey); }catch(e){}

    var subtitle = document.getElementById('comSubtitle');
    var body = document.getElementById('comBody');
    
    subtitle.innerHTML = post.subtitle || '';
    body.classList.remove('content-loaded');
    body.innerHTML = post.html;
    
    void body.offsetWidth;
    body.classList.add('content-loaded');

    if(region){
      region.classList.remove('turning-out');
      void region.offsetWidth;
      region.classList.add('turning-in');
    }

    if(_bellEnabled) ringSacredBell();

  }, _td);
}

function cleanHtml(html){
  if(!html) return '';
  html = html.replace(/<hr[^>]*>/gi, '');
  html = html.replace(/<p[^>]*>\s*(?:&nbsp;|&#160;)?\s*<\/p>/gi, '');
  html = html.replace(/<button[^>]*>[\s\S]*?<\/button>/gi, '');
  return html.trim();
}

function parseItem(item){
  var getTag = function(t){ var e=item.getElementsByTagName(t)[0]; return e?(e.textContent||''):''; };
  var title=getTag('title');
  var m=title.match(/^(\d{4}-\d{2}-\d{2})\s*[-—–]\s*(.*)/);
  var enc = item.getElementsByTagName('content:encoded')[0];
  var rawHtml=cleanHtml(enc ? enc.textContent : getTag('description'));
  
  return { 
    dateKey: m ? m[1] : null, 
    litDay: (m && m[2]) ? m[2].trim() : '', 
    subtitle: getTag('subtitle'), 
    html: rawHtml 
  };
}

function fetchFeed() {
  var url = 'https://' + SUBSTACK_SLUG + '.substack.com/feed';
  fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url))
    .then(r => r.json())
    .then(data => {
      var xmlDoc = new DOMParser().parseFromString(data.contents, "text/xml");
      var items = Array.from(xmlDoc.querySelectorAll('item'));
      allPosts = items.map(parseItem).filter(p => p.dateKey).sort((a,b) => b.dateKey.localeCompare(a.dateKey));
      
      var paramDate = new URLSearchParams(window.location.search).get('date');
      var i = allPosts.findIndex(p => p.dateKey === (paramDate || todayKey()));
      curIdx = i >= 0 ? i : 0;
      render();
    })
    .catch(() => showToast("The archives are resting."));
}

/* ── QUIET, SLOW PARTICLES (DUST & EMBERS) ── */
const dCv = document.getElementById('dustCanvas');
const eCv = document.getElementById('emberCanvas');
const dCtx = dCv.getContext('2d');
const eCtx = eCv.getContext('2d');
let w, h, dustArray = [], emberArray = [];

function resize() {
  w = window.innerWidth; h = window.innerHeight;
  dCv.width = w; dCv.height = h; eCv.width = w; eCv.height = h;
}
window.addEventListener('resize', resize);
resize();

class Dust {
  constructor() {
    this.x = Math.random() * w; this.y = Math.random() * h;
    this.size = Math.random() * 1.2;
    this.speedY = Math.random() * 0.1 + 0.05; // Extremely slow fall
    this.speedX = (Math.random() - 0.5) * 0.1;
    this.opacity = Math.random() * 0.3; // Very dim
  }
  update() {
    this.y += this.speedY; this.x += this.speedX;
    if (this.y > h) { this.y = 0; this.x = Math.random() * w; }
  }
  draw() {
    dCtx.fillStyle = `rgba(255, 250, 240, ${this.opacity})`;
    dCtx.beginPath(); dCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2); dCtx.fill();
  }
}

class Ember {
  constructor() {
    this.x = Math.random() * w; this.y = h + Math.random() * 200;
    this.size = Math.random() * 1.5 + 0.5;
    this.speedY = -(Math.random() * 0.5 + 0.2); // Slow rise
    this.speedX = (Math.random() - 0.5) * 0.5;
    this.life = Math.random() * 0.5 + 0.1;
  }
  update() {
    this.y += this.speedY; this.x += this.speedX + Math.sin(this.y * 0.01) * 0.2;
    this.life -= 0.001;
    if (this.life <= 0 || this.y < 0) {
      this.y = h + 10; this.x = Math.random() * w; this.life = Math.random() * 0.5 + 0.1;
    }
  }
  draw() {
    eCtx.fillStyle = `rgba(255, 140, 20, ${this.life})`;
    eCtx.beginPath(); eCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2); eCtx.fill();
  }
}

// Fewer particles to keep the focus on the text
for (let i = 0; i < 40; i++) dustArray.push(new Dust());
for (let i = 0; i < 15; i++) emberArray.push(new Ember());

function animateParticles() {
  dCtx.clearRect(0, 0, w, h); eCtx.clearRect(0, 0, w, h);
  dustArray.forEach(d => { d.update(); d.draw(); });
  emberArray.forEach(e => { e.update(); e.draw(); });
  requestAnimationFrame(animateParticles);
}

/* ── IGNITE ── */
document.addEventListener('DOMContentLoaded', () => {
  document.body.style.opacity = '1';
  animateParticles();
  fetchFeed();
});
</script>
</body>
</html>
